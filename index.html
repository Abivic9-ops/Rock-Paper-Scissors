<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scisors Game</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<main class="head-title">
   <h1>Rock Paper Scissors Game</h1> 
</main>


    <!-- The main container with the main content -->
    <section class="main">
        <haeder class="main-header">
            <h2 class="game-title">Comrade,Tuguze!!</h2>
        </haeder>

        <section class="results">
            <h1 class="player-choice-text">✊🏾</h1>
            <h1 class="versus-text">vs</h1>
            <h1 class="cpu-choice-text">✊🏾</h1>
        </section>

        <section class="score-board">
            <h3>Won: <span class="score-won-text">0</span>
                <div class="divider-vertical"></div>
                <h3>Draw: <span class="score-draw-text">0</span>
                    <div class="divider-vertical"></div>
                    <h3>Loss: <span class="score-lost-text">0</span>
        </section>

        <!-- A bbox with the options the player is to choose from -->
        <section class="options-choice">
            <div class="option-wrapper">
                <button class="choice-btn" value="rock">✊🏾</button>
                <h3 class="choice-label">Rock</h3>
            </div>
       
            <div class="option-wrapper">
                <button class="choice-btn" value="paper">✋🏾</button>
                <h3 class="choice-label">Paper</h3>
            </div>
        
        
            <div class="option-wrapper">
                <button class="choice-btn" value="scissors">✌🏾</button>
                <h3 class="choice-label">Scissors</h3>
            </div>
        </section>


    </section>

   <footer class="footer-section">
    <p>&copy; 2026 Abivic9-Ops. All rights reserved.</p>
     <div class="social-media">
        <a href="#"><i class='bx bxl-github'></i></a>
        <a href="#"><i class='bx bxl-linkedin'></i></a>
    </div>
   </footer>
</body>
<script src="script.js"></script>


</html>
